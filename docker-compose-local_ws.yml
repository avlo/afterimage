services:
  afterimage-db:
    container_name: afterimage-db-redis-local_ws
    image: "redis:8.0.0"
    hostname: localhost
    ports:
      - "6380:6379"
#    environment:
#      - "REDIS_ARGS=--appendonly yes"
    networks:
      - docker-network
volumes:
  afterimage-db:
    driver: local
networks:
  docker-network:
    driver: bridge
