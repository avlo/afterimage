services:
#  SC Redis 6379
  superconductor-db:
    image: "redis:8.0.0"
    hostname: superconductor-db
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli" ,"ping", "superconductor-db" ]
      retries: 3
      interval: 1s
      timeout: 2s
    networks:
      - docker-network
#  SC App 5555
  superconductor-afterimage:
    image: avlo/superconductor-app-redis:1.17.2
    ports:
      - "5555:5555"
# below commented due to wget unavailable in container, instead use SingleContainerTestConfig Wait.defaultWaitStrategy()
#    healthcheck:
#      test: [ "CMD", "wget", "--no-verbose", "--spider", "http://0.0.0.0:5555/api-tests.html" ]
#      retries: 5
#      interval: 2s
#      timeout: 10s
#      start_period: 5s
    depends_on:
      superconductor-db:
        condition: service_healthy
    networks:
      - docker-network
    environment:
      SPRING_PROFILES_ACTIVE: dev_ws
      SPRING_DATA_REDIS_HOST: superconductor-db
#
volumes:
  superconductor-db:
    driver: local
networks:
  docker-network:
    driver: bridge
