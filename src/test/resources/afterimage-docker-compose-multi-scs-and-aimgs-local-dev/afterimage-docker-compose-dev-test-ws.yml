services:
#  SC Redis 6379
  superconductor-db:
    image: "redis:8.0.0"
    hostname: superconductor-db
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli" ,"ping", "superconductor-db" ]
      retries: 3
      interval: 1s
      timeout: 2s
# networks:
#      - docker-network
#  SC App 5555
  superconductor-afterimage:
    image: avlo/superconductor-app-redis:1.17.3
#    hostname: superconductor-afterimage
    ports:
      - "5555:5555"
    depends_on:
      superconductor-db:
        condition: service_healthy
# networks:
#      - docker-network
    environment:
      SPRING_PROFILES_ACTIVE: dev_ws
#      SUPERCONDUCTOR_RELAY_URL: "ws://0.0.0.0:5555"
      SUPERCONDUCTOR_RELAY_URL: "ws://superconductor-afterimage:5555"
      LOGGING_LEVEL_COM_PROSILION_SUPERCONDUCTOR_BASE_CONTROLLER: debug
      LOGGING_LEVEL_COM_PROSILION_SUPERCONDUCTOR_BASE_SERVICE_EVENT: info
      SPRING_DATA_REDIS_HOST: superconductor-db
#   aImg App2's Redis 6381 (docker container)
  afterimage-db-two:
    image: "redis:8.0.0"
    hostname: afterimage-db-two
    ports:
      - "6381:6379"
    healthcheck:
      test: [ "CMD", "redis-cli" ,"ping", "afterimage-db-two" ]
      retries: 3
      interval: 1s
      timeout: 2s
# networks:
#      - docker-network
#  
# aImg App2 5557 (docker container)
  afterimage-app:
    image: afterimage-nostr-reputation-relay:1.2.0
#    hostname: afterimage-app
    ports:
      - "5557:5556"
    depends_on:
      afterimage-db-two:
        condition: service_healthy
# networks:
#      - docker-network
    environment:
      SPRING_PROFILES_ACTIVE: dev_ws
#      SUPERCONDUCTOR_RELAY_URL: "ws://0.0.0.0:5555"
#      SUPERCONDUCTOR_RELAY_URL: "ws://superconductor-afterimage:5555"
#      AFTERIMAGE_RELAY_URL: "ws://0.0.0.0:5557"
      AFTERIMAGE_RELAY_URL: "ws://afterimage-app:5557"
      LOGGING_LEVEL_COM_PROSILION_SUPERCONDUCTOR_BASE_CONTROLLER: debug
      LOGGING_LEVEL_COM_PROSILION_SUPERCONDUCTOR_BASE_SERVICE_EVENT: info
      SPRING_DATA_REDIS_HOST: afterimage-db-two
#
volumes:
  superconductor-db:
    driver: local
  afterimage-db-two:
    driver: local
networks:
  localhost:
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "localhost"
#  docker-network:
#    driver: bridge
