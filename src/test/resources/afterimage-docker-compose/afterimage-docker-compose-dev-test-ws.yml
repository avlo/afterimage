services:
#  SC Redis
  superconductor-db:
    image: "redis:8.0.0"
    hostname: superconductor-db
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli" ,"ping", "superconductor-db" ]
      retries: 3
      interval: 1s
      timeout: 2s
    networks:
      - docker-network
#
#  SC App 5555
#
  superconductor-afterimage:
    image: avlo/superconductor-app-redis:1.17.3
    ports:
      - "5555:5555"
# below commented due to wget unavailable in container, instead use MultiContainerTestConfig Wait.defaultWaitStrategy()
#    healthcheck:
#      test: [ "CMD", "wget", "--no-verbose", "--spider", "http://localhost:5555/api-tests.html" ]
#      retries: 3
#      interval: 1s
#      timeout: 3s
#      start_period: 3s
    depends_on:
      superconductor-db:
        condition: service_healthy
    networks:
      - docker-network
    environment:
#      superconductor.auth.active: false
      SPRING_PROFILES_ACTIVE: dev_ws
      SPRING_DATA_REDIS_HOST: superconductor-db
#      
#      aImg Redis
#
  afterimage-db:
    image: "redis:8.0.0"
    hostname: afterimage-db
    ports:
      - "6381:6379"
    healthcheck:
      test: [ "CMD", "redis-cli" ,"ping", "afterimage-db" ]
      retries: 3
      interval: 1s
      timeout: 2s
    networks:
      - docker-network
# 
# aImg         
  afterimage-app:
    image: afterimage-nostr-reputation-relay:1.1.0
    ports:
      - "5557:5556"
# below commented due to wget unavailable in container, instead use MultiContainerTestConfig Wait.defaultWaitStrategy()
#    healthcheck:
#      test: [ "CMD", "wget", "--no-verbose", "--spider", "http://localhost:5556/api-tests.html" ]
#      retries: 3
#      interval: 1s
#      timeout: 3s
#      start_period: 3s
    depends_on:
      afterimage-db:
        condition: service_healthy
    networks:
      - docker-network
    #    links:
    #      - superconductor-afterimage-two
    environment:
#      superconductor.auth.active: false
      SPRING_PROFILES_ACTIVE: dev_ws
      SPRING_DATA_REDIS_HOST: afterimage-db      
volumes:
  superconductor-db:
    driver: local  
  afterimage-db:
    driver: local
