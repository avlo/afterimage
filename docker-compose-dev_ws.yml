services:
  afterimage-db:
    container_name: afterimage-db-redis-dev_ws
    image: "redis:8.0.0"
    hostname: afterimage-db
    ports:
      - "6380:6379"
    networks:
      - docker-network
  afterimage-app:
    container_name: afterimage-app-redis-dev_ws
    image: avlo/afterimage-nostr-reputation-relay:1.2.0
    ports:
      - "5556:5556"
    depends_on:
      - afterimage-db
    networks:
      - docker-network
    environment:
      AFTERIMAGE_RELAY_URL: "ws://localhost:5556"
      SPRING_PROFILES_ACTIVE: dev_ws
      SPRING_DATA_REDIS_HOST: afterimage-db
volumes:
  afterimage-db:
    driver: local
networks:
  docker-network:
    driver: bridge
